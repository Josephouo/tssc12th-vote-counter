<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時投票計數器</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN for browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- React 應用程式代碼 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 自訂內聯 SVG 圖標，免去載入外部圖標庫失敗的風險
    const Icons = {
      RotateCcw: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      ),
      Plus: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
      ),
      Minus: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>
      ),
      Trash2: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      ),
      Lock: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      ),
      Unlock: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
      ),
      Volume2: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      ),
      VolumeX: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>
      ),
      Download: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      ),
      FileText: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      ),
      PlusCircle: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
      ),
      RotateCw: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      ),
      HelpCircle: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
      ),
      TrendingUp: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      ),
      X: () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
      )
    };

    function App() {
      // 投票項目狀態 (最基礎狀態，1號、2號、廢票全數歸零)
      const [options, setOptions] = useState([
        { id: '1', name: '1號', count: 0, color: '#3b82f6', history: [0] },
        { id: '2', name: '2號', count: 0, color: '#ef4444', history: [0] },
        { id: '3', name: '廢票', count: 0, color: '#64748b', history: [0] }
      ]);

      // 全域設定與狀態
      const [isLocked, setIsLocked] = useState(true); 
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [shortcutsEnabled, setShortcutsEnabled] = useState(true);
      const [showResetModal, setShowResetModal] = useState(false);
      const [showShortcutHelp, setShowShortcutHelp] = useState(false);
      const [newOptionName, setNewOptionName] = useState('');
      const [newOptionColor, setNewOptionColor] = useState('#6366f1');

      // 精緻音效播放系統 (使用瀏覽器內建 Web Audio API，不需要加載外部音檔)
      const playSound = (type) => {
        if (!soundEnabled) return;
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'plus') {
            osc.frequency.setValueAtTime(587.33, ctx.currentTime); // 輕快高音 D5
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
            osc.start();
            osc.stop(ctx.currentTime + 0.08);
          } else if (type === 'minus') {
            osc.frequency.setValueAtTime(293.66, ctx.currentTime); // 低沉音 D4
            gain.gain.setValueAtTime(0.08, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          } else if (type === 'undo') {
            osc.frequency.setValueAtTime(440, ctx.currentTime); // 復原音 A4
            gain.gain.setValueAtTime(0.06, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
            osc.start();
            osc.stop(ctx.currentTime + 0.12);
          }
        } catch (e) {
          console.warn('音效播放失敗:', e);
        }
      };

      // 鍵盤快捷鍵監聽 (1~9 對應各個選項的快速加票)
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!shortcutsEnabled) return;
          if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
            return;
          }

          const key = e.key;
          // 數字鍵 1-9
          if (key >= '1' && key <= '9') {
            const index = parseInt(key) - 1;
            if (index < options.length) {
              e.preventDefault();
              increment(options[index].id);
            }
          }
          
          // 字母鍵 Q, W, E, R, T...
          const letters = ['q', 'w', 'e', 'r', 't', 'y'];
          const indexLetter = letters.indexOf(key.toLowerCase());
          if (indexLetter !== -1 && indexLetter < options.length) {
            e.preventDefault();
            increment(options[indexLetter].id);
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [options, shortcutsEnabled]);

      // 加票
      const increment = (id) => {
        setOptions(prev => prev.map(opt => {
          if (opt.id === id) {
            const newCount = opt.count + 1;
            const newHistory = [...opt.history, opt.count];
            playSound('plus');
            return { ...opt, count: newCount, history: newHistory };
          }
          return opt;
        }));
      };

      // 減票
      const decrement = (id) => {
        setOptions(prev => prev.map(opt => {
          if (opt.id === id && opt.count > 0) {
            const newCount = opt.count - 1;
            const newHistory = [...opt.history, opt.count];
            playSound('minus');
            return { ...opt, count: newCount, history: newHistory };
          }
          return opt;
        }));
      };

      // 個別返回上一步 (Undo)
      const undo = (id) => {
        setOptions(prev => prev.map(opt => {
          if (opt.id === id && opt.history.length > 1) {
            const historyCopy = [...opt.history];
            const lastCount = historyCopy.pop(); // 取出上一步的票數
            playSound('undo');
            return { ...opt, count: lastCount, history: historyCopy };
          }
          return opt;
        }));
      };

      // 手動追加選項 (在解鎖編輯狀態下可見)
      const handleAddOption = (e) => {
        e.preventDefault();
        if (!newOptionName.trim()) return;
        const newOpt = {
          id: Date.now().toString(),
          name: newOptionName.trim(),
          count: 0,
          color: newOptionColor,
          history: [0]
        };
        setOptions(prev => [...prev, newOpt]);
        setNewOptionName('');
      };

      // 刪除項目 (在解鎖編輯狀態下可見)
      const handleDeleteOption = (id) => {
        setOptions(prev => prev.filter(opt => opt.id !== id));
      };

      // 修改項目名稱
      const handleRenameOption = (id, newName) => {
        setOptions(prev => prev.map(opt => {
          if (opt.id === id) {
            return { ...opt, name: newName };
          }
          return opt;
        }));
      };

      // 全域歸零
      const handleGlobalReset = () => {
        setOptions(prev => prev.map(opt => ({
          ...opt,
          count: 0,
          history: [0]
        })));
        setShowResetModal(false);
      };

      const totalVotes = options.reduce((sum, opt) => sum + opt.count, 0);

      // 匯出 CSV 檔案
      const exportToCSV = () => {
        let csvContent = "\uFEFF"; // 避免 Excel 開啟時中文亂碼
        csvContent += "項目名稱,票數,佔比\n";
        options.forEach(opt => {
          const percentage = totalVotes > 0 ? ((opt.count / totalVotes) * 100).toFixed(1) + '%' : '0%';
          csvContent += `"${opt.name}",${opt.count},${percentage}\n`;
        });
        csvContent += `\n總計票數,${totalVotes},100%\n`;

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `投票統計結果_${new Date().toLocaleDateString('zh-TW')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 複製文字報表到剪貼簿
      const copyReport = () => {
        let report = `📊 投票結果即時報表\n時間: ${new Date().toLocaleString('zh-TW')}\n------------------------\n`;
        options.forEach(opt => {
          const percentage = totalVotes > 0 ? ((opt.count / totalVotes) * 100).toFixed(1) + '%' : '0%';
          report += `${opt.name}: ${opt.count} 票 (${percentage})\n`;
        });
        report += `------------------------\n總票數: ${totalVotes} 票`;

        const text_area = document.createElement("textarea");
        text_area.value = report;
        document.body.appendChild(text_area);
        text_area.select();
        try {
          document.execCommand('copy');
        } catch (err) {
          console.error('複製失敗');
        }
        document.body.removeChild(text_area);
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col font-sans transition-colors duration-200">
          
          {/* 導覽列與頂部控制台 */}
          <header className="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40 px-4 py-3 sm:px-6">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <span className="text-2xl">🗳️</span>
                  <div>
                    <h1 className="text-xl font-extrabold tracking-tight text-slate-900">即時投票計數器</h1>
                    <p className="text-xs text-slate-500 font-medium">簡單・高效・精準統計</p>
                  </div>
                </div>
                
                {/* 行動端快速解鎖切換 */}
                <div className="md:hidden flex items-center gap-2">
                  <button
                    onClick={() => setIsLocked(!isLocked)}
                    className={`p-2 rounded-lg border text-sm flex items-center gap-1 font-medium transition-all ${
                      isLocked 
                        ? 'bg-amber-50 border-amber-200 text-amber-700' 
                        : 'bg-emerald-50 border-emerald-200 text-emerald-700'
                    }`}
                  >
                    {isLocked ? <Icons.Lock /> : <Icons.Unlock />}
                    <span className="ml-1">{isLocked ? '鎖定' : '編輯'}</span>
                  </button>
                </div>
              </div>

              {/* 控制按鈕功能群 */}
              <div className="flex flex-wrap items-center gap-2">
                <button
                  onClick={() => setSoundEnabled(!soundEnabled)}
                  className={`p-2 rounded-lg border flex items-center justify-center transition-all ${
                    soundEnabled 
                      ? 'bg-slate-100 border-slate-300 text-slate-700' 
                      : 'bg-red-50 border-red-200 text-red-500'
                  }`}
                  title={soundEnabled ? "關閉音效" : "開啟音效"}
                >
                  {soundEnabled ? <Icons.Volume2 /> : <Icons.VolumeX />}
                </button>

                <button
                  onClick={() => setShowShortcutHelp(true)}
                  className="p-2 rounded-lg border bg-slate-100 border-slate-300 text-slate-700 flex items-center justify-center hover:bg-slate-200 transition-all"
                  title="快捷鍵說明"
                >
                  <Icons.HelpCircle />
                </button>

                <button
                  onClick={() => setIsLocked(!isLocked)}
                  className={`hidden md:flex items-center gap-1.5 px-3 py-2 rounded-lg border text-sm font-semibold transition-all ${
                    isLocked 
                      ? 'bg-amber-50 border-amber-200 text-amber-700 hover:bg-amber-100' 
                      : 'bg-emerald-50 border-emerald-200 text-emerald-700 hover:bg-emerald-100'
                  }`}
                >
                  {isLocked ? <Icons.Lock /> : <Icons.Unlock />}
                  <span>{isLocked ? '防誤觸已鎖定' : '修改名稱與項目'}</span>
                </button>

                <button
                  onClick={exportToCSV}
                  className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold shadow-sm transition-all"
                >
                  <Icons.Download />
                  <span>匯出 CSV</span>
                </button>

                <button
                  onClick={copyReport}
                  className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold shadow-sm transition-all"
                >
                  <Icons.FileText />
                  <span>複製報表</span>
                </button>

                <button
                  onClick={() => setShowResetModal(true)}
                  className="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-rose-100 hover:bg-rose-200 text-rose-700 border border-rose-200 text-sm font-semibold transition-all"
                >
                  <Icons.RotateCw />
                  <span>數據歸零</span>
                </button>
              </div>

            </div>
          </header>

          {/* 主要操作區域 */}
          <main className="flex-grow max-w-6xl w-full mx-auto p-4 sm:p-6 space-y-6">
            
            {/* 選情統計總結 (一開始就用最完美的完整尺寸渲染，不跳動) */}
            <section className="bg-white p-4 sm:p-5 rounded-2xl border border-slate-200 shadow-sm space-y-4">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <Icons.TrendingUp />
                  <h2 className="text-lg font-bold text-slate-800">選情即時統計</h2>
                </div>
                <div className="bg-indigo-50 text-indigo-700 font-extrabold px-4 py-1.5 rounded-full text-sm sm:text-base">
                  總計票數：{totalVotes} 票
                </div>
              </div>

          <div className="space-y-4">
            {/* 堆疊進度條：即使為 0 票，也會有固定高度與提示，防止畫面跳動 */}
            <div className="h-6 w-full rounded-full bg-slate-100 overflow-hidden flex shadow-inner relative items-center justify-center">
              {totalVotes === 0 ? (
                <span className="text-xs text-slate-400 font-bold tracking-wide select-none absolute">
                  等待首張選票...
                </span>
              ) : (
                options.map((opt) => {
                  const pct = totalVotes > 0 ? (opt.count / totalVotes) * 100 : 0;
                  if (pct === 0) return null;
                  return (
                    <div
                      key={opt.id}
                      style={{ width: `${pct}%`, backgroundColor: opt.color }}
                      className="h-full transition-all duration-300 relative"
                      title={`${opt.name}: ${opt.count} 票 (${pct.toFixed(1)}%)`}
                    />
                  );
                })
              )}
            </div>

            {/* 項目與比例清單 (去降 min-h 高度限制，百分比與票數極致放大) */}
            <div className="grid grid-cols-3 gap-3">
              {options.map((opt) => {
                const pct = totalVotes > 0 ? (opt.count / totalVotes) * 100 : 0;
                return (
                  <div 
                    key={opt.id} 
                    className="bg-slate-50 p-2.5 sm:p-3 rounded-xl border border-slate-100 flex flex-col justify-between hover:bg-slate-100/50 transition-colors"
                  >
                    {/* 頂部：顏色與項目名稱 */}
                    <div className="flex items-center gap-1.5 truncate w-full mb-1">
                      <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: opt.color }} />
                      <span className="font-extrabold text-slate-500 text-xs sm:text-sm truncate">{opt.name}</span>
                    </div>
                    
                    {/* 底部：放大的票數與同樣放大、好讀的百分比 */}
                    <div className="flex items-end justify-between">
                      <span className="text-3xl sm:text-4xl font-black text-slate-900 font-mono leading-none">
                        {opt.count}
                      </span>
                      <span className="text-lg sm:text-2xl font-black text-slate-500 font-mono leading-none">
                        {pct.toFixed(1)}%
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
            </section>

            {/* 核心投票計數器卡片（橫向條狀排列） */}
            <section className="grid grid-cols-1 gap-4">
              {options.map((opt, index) => {
                const shortcuts = ['Q', 'W', 'E', 'R', 'T', 'Y'];
                const keyLabel = index < 9 ? `${index + 1} 或 ${shortcuts[index] || ''}` : null;
                const canUndo = opt.history.length > 1; // 判斷是否能進行 Undo

                return (
                  <div 
                    key={opt.id}
                    className="bg-white rounded-2xl border-2 border-slate-200 shadow-md hover:shadow-lg transition-all relative overflow-hidden flex flex-row items-stretch h-32 sm:h-36"
                    style={{ borderLeftColor: opt.color, borderLeftWidth: '8px' }}
                  >
                    
                    {/* 最左側：大面積減票按鈕 (-) */}
                    <button
                      onClick={() => decrement(opt.id)}
                      className="w-16 sm:w-24 shrink-0 bg-slate-50 border-r border-slate-100 hover:bg-rose-50 hover:text-rose-600 flex items-center justify-center transition-all select-none active:scale-95 text-slate-500"
                      style={{ touchAction: 'manipulation' }}
                      title="減少一票"
                    >
                      <Icons.Minus />
                    </button>

                    {/* 中間資訊與超大得票數 */}
                    <div className="flex-grow flex flex-col justify-between p-3 sm:p-4 min-w-0">
                      
                      {/* 中間上半部：小控制列 (Undo, 項目名稱, 刪除與快捷鍵) */}
                      <div className="flex items-center justify-between border-b border-slate-100 pb-1.5 sm:pb-2">
                        
                        {/* 個別項目一鍵復原 */}
                        <button
                          onClick={() => undo(opt.id)}
                          disabled={!canUndo}
                          className={`p-1 rounded-full border transition-all ${
                            canUndo 
                              ? 'bg-white border-slate-300 text-slate-700 hover:bg-slate-100 hover:scale-105 active:scale-95' 
                              : 'bg-slate-100 border-slate-200 text-slate-300 cursor-not-allowed'
                          }`}
                          title="復原此項目上一步"
                        >
                          <Icons.RotateCcw />
                        </button>

                        {/* 項目名稱 (解鎖狀態下可修改) */}
                        <div className="flex-grow max-w-[60%] mx-2 text-center">
                          {isLocked ? (
                            <span className="text-base sm:text-lg font-black text-slate-800 truncate block px-1">
                              {opt.name}
                            </span>
                          ) : (
                            <input
                              type="text"
                              value={opt.name}
                              onChange={(e) => handleRenameOption(opt.id, e.target.value)}
                              className="text-center font-bold text-base sm:text-lg text-slate-800 bg-amber-50 focus:bg-white border border-dashed border-amber-300 rounded px-1 py-0.5 w-full focus:outline-none focus:border-indigo-500"
                            />
                          )}
                        </div>

                        {/* 鍵盤熱鍵或刪除 */}
                        <div className="flex items-center gap-1">
                          {shortcutsEnabled && keyLabel && isLocked && (
                            <span className="bg-slate-200 text-slate-600 text-[9px] font-black px-1.5 py-0.5 rounded uppercase tracking-wider">
                              鍵: {keyLabel}
                            </span>
                          )}
                          
                          {!isLocked && (
                            <button
                              onClick={() => handleDeleteOption(opt.id)}
                              className="p-1.5 rounded hover:bg-rose-50 text-rose-500 hover:text-rose-600 transition-colors"
                              title="刪除項目"
                            >
                              <Icons.Trash2 />
                            </button>
                          )}
                        </div>

                      </div>

                      {/* 中間下半部：超大置中得票數字 */}
                      <div className="flex-grow flex items-center justify-center">
                        <span className="text-4xl sm:text-5xl font-black text-slate-900 font-mono tracking-tight select-none leading-none">
                          {opt.count}
                        </span>
                      </div>

                    </div>

                    {/* 最右側：色彩填滿的加票按鈕 (+) */}
                    <button
                      onClick={() => increment(opt.id)}
                      className="w-20 sm:w-32 shrink-0 text-white flex items-center justify-center transition-all select-none active:scale-95 shadow-inner"
                      style={{ 
                        backgroundColor: opt.color, 
                        filter: 'brightness(0.95)',
                        touchAction: 'manipulation'
                      }}
                      title="增加一票"
                    >
                      <Icons.Plus />
                    </button>

                  </div>
                );
              })}
            </section>

            {/* 手動追加選項面板 (只在解除鎖定狀態下可見) */}
            {!isLocked && (
              <section className="bg-white p-5 rounded-2xl border border-amber-200 shadow-sm bg-gradient-to-br from-amber-50/40 to-white">
                <h3 className="text-base font-bold text-amber-800 mb-3 flex items-center gap-2">
                  <Icons.PlusCircle />
                  追加更多自訂投票項目
                </h3>
                <form onSubmit={handleAddOption} className="flex flex-col sm:flex-row gap-3">
                  <input
                    type="text"
                    placeholder="輸入新項目名稱（例如：3號、棄權票等...）"
                    value={newOptionName}
                    onChange={(e) => setNewOptionName(e.target.value)}
                    className="flex-grow border border-slate-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                  />
                  <div className="flex items-center gap-3">
                    <label className="text-sm font-semibold text-slate-600 shrink-0">標記顏色：</label>
                    <input
                      type="color"
                      value={newOptionColor}
                      onChange={(e) => setNewOptionColor(e.target.value)}
                      className="w-10 h-10 border border-slate-300 rounded-lg cursor-pointer shrink-0"
                    />
                    <button
                      type="submit"
                      className="w-full sm:w-auto px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold shadow transition-all flex items-center justify-center gap-1.5"
                    >
                      <Icons.Plus />
                      確認新增
                    </button>
                  </div>
                </form>
              </section>
            )}

          </main>

          {/* 底部 Footer */}
          <footer className="bg-white border-t border-slate-200 py-6 text-center text-xs text-slate-400 mt-auto">
            <div className="max-w-6xl mx-auto px-4">
              <p className="mb-1">即時投票計數器 © 2026. 專為現場、會議及公開投票快速統計設計。</p>
              <p>支援行動裝置觸控，可使用實體鍵盤 1、2、3 / Q、W、E 進行無縫高速計票。</p>
            </div>
          </footer>

          {/* 防誤觸全域重設防呆彈窗 */}
          {showResetModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-slate-100 animate-in fade-in zoom-in duration-200">
                <div className="flex items-start gap-4">
                  <div className="p-3 bg-rose-50 rounded-full text-rose-600 shrink-0">
                    <Icons.RotateCw />
                  </div>
                  <div>
                    <h3 className="text-lg font-bold text-slate-900 mb-1">確定要清空所有投票數據嗎？</h3>
                    <p className="text-sm text-slate-500">
                      這個操作會將當前**所有項目歸零（0 票）**且無法恢復。請在點選前確認是否已備份數據或複製報表。
                    </p>
                  </div>
                </div>
                <div className="mt-6 flex justify-end gap-3">
                  <button
                    onClick={() => setShowResetModal(false)}
                    className="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-xl transition-colors"
                  >
                    取消
                  </button>
                  <button
                    onClick={handleGlobalReset}
                    className="px-4 py-2 text-sm font-semibold text-white bg-rose-600 hover:bg-rose-700 rounded-xl shadow-md transition-colors"
                  >
                    沒問題，全數歸零
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 實體鍵盤快捷鍵指南 */}
          {showShortcutHelp && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-slate-100">
                <div className="flex items-center justify-between pb-3 border-b border-slate-100">
                  <h3 className="text-lg font-bold text-slate-900 flex items-center gap-1.5">
                    <span>⌨️</span> 實體鍵盤快捷鍵指南
                  </h3>
                  <button 
                    onClick={() => setShowShortcutHelp(false)}
                    className="p-1 rounded hover:bg-slate-100 text-slate-400"
                  >
                    <Icons.X />
                  </button>
                </div>
                <div className="mt-4 space-y-3">
                  <p className="text-sm text-slate-500">
                    為方便電腦端進行盲按快速計量，可使用鍵盤對應快速加 1 票：
                  </p>
                  
                  <div className="space-y-2 bg-slate-50 p-4 rounded-xl border border-slate-100 font-mono text-sm">
                    {options.map((opt, index) => {
                      const shortcuts = ['Q', 'W', 'E', 'R', 'T', 'Y'];
                      const numKey = index + 1;
                      const letterKey = shortcuts[index] || '';
                      
                      return (
                        <div key={opt.id} className="flex justify-between items-center py-1 border-b border-slate-200 last:border-0">
                          <div className="flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: opt.color }} />
                            <span className="font-bold text-slate-700">{opt.name} 加 1 票</span>
                          </div>
                          <div className="flex gap-1.5">
                            <kbd className="bg-white border border-slate-300 px-2 py-0.5 rounded shadow-sm text-xs font-bold text-slate-800">{numKey}</kbd>
                            {letterKey && (
                              <>
                                <span className="text-slate-400">或</span>
                                <kbd className="bg-white border border-slate-300 px-2 py-0.5 rounded shadow-sm text-xs font-bold text-slate-800">{letterKey}</kbd>
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="flex justify-between items-center pt-3 border-t border-slate-100">
                    <span className="text-sm font-semibold text-slate-700">啟用鍵盤快捷計票</span>
                    <button
                      onClick={() => setShortcutsEnabled(!shortcutsEnabled)}
                      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${
                        shortcutsEnabled ? 'bg-indigo-600' : 'bg-slate-300'
                      }`}
                    >
                      <span
                        className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                          shortcutsEnabled ? 'translate-x-6' : 'translate-x-1'
                        }`}
                      />
                    </button>
                  </div>
                </div>
                <div className="mt-6 flex justify-end">
                  <button
                    onClick={() => setShowShortcutHelp(false)}
                    className="px-5 py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-semibold shadow-sm text-sm transition-colors"
                  >
                    我知道了
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
